name: teste e2e - Web agi Blog

on:
  workflow_dispatch:

jobs:
  testes:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar dependencias
        run: mvn install -DskipTests

      - name: Rodar os testes
        run: mvn test
        continue-on-error: true

      - name: Configurar allure histórico do relatório
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Gerar o relatório do allure
        uses: allure-framework/allure-report-action@v1
        with:
          allure-results: target/allure-results
          allure-history: allure-history
          keep_reports: 20

      - name: Publicar relatório para github pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history